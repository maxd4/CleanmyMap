version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/" # Racine du monorépo
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    reviewers:
      - "maxd4"
    labels:
      - "dependencies"
      - "npm"
    groups:
      dependencies:
        applies-to: "version-updates"
        patterns:
          - "*"
        exclude-patterns:
          - "next"
          - "react"
          - "react-dom"
      security-updates:
        applies-to: "security-updates"
        patterns:
          - "*"
        exclude-patterns:
          - "next"
          - "react"
          - "react-dom"

  - package-ecosystem: "npm"
    directory: "/apps/web" # Dossier spécifique de l'app web
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    reviewers:
      - "maxd4"
    labels:
      - "dependencies"
      - "npm"
      - "apps/web"
    groups:
      dependencies:
        applies-to: "version-updates"
        patterns:
          - "*"
        exclude-patterns:
          - "next"
          - "react"
          - "react-dom"
      security-updates:
        applies-to: "security-updates"
        patterns:
          - "*"
        exclude-patterns:
          - "next"
          - "react"
          - "react-dom"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    reviewers:
      - "maxd4"
    labels:
      - "dependencies"
      - "github-actions"
