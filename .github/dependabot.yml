version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    reviewers:
      - "maxd4"
    labels:
      - "dependencies"
      - "npm"
    groups:
      workspace-version-updates:
        applies-to: "version-updates"
        patterns:
          - "*"
      workspace-security-updates:
        applies-to: "security-updates"
        patterns:
          - "*"
    # Le lockfile racine couvre le workspace `apps/web`, donc un seul bloc npm
    # suffit pour le monorepo web. Aucune règle ignore n'est ajoutée ici:
    # aucune dépendance clairement non pertinente n'a été identifiée.

  - package-ecosystem: "npm"
    directory: "/companion-app"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    reviewers:
      - "maxd4"
    labels:
      - "dependencies"
      - "npm"
    groups:
      companion-version-updates:
        applies-to: "version-updates"
        patterns:
          - "*"
      companion-security-updates:
        applies-to: "security-updates"
        patterns:
          - "*"
    # `companion-app` reste un projet npm autonome avec son propre lockfile.
    # On le garde séparé pour éviter les doublons avec le workspace principal.

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions:
        applies-to: "version-updates"
        patterns:
          - "*"
    # Les Actions sont groupées pour éviter une PR par workflow tout en
    # conservant une revue unique des mises à jour.
