name: lockfile-policy

on:
  push:
  pull_request:

jobs:
  lockfile-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Enforce single-lockfile policy
        run: node scripts/check-lockfile-policy.mjs
