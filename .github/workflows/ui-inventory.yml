name: ui-inventory

on:
  push:
  pull_request:

jobs:
  inventory:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: UI inventory check (warn-only drift)
        id: ui_inventory_check
        run: |
          set +e
          python -m scripts.ui_inventory check
          EXIT_CODE=$?
          echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"
          if [ "${EXIT_CODE}" -eq 0 ]; then
            echo "UI inventory check passed (no drift)."
            exit 0
          fi
          if [ "${EXIT_CODE}" -eq 3 ]; then
            echo "::warning title=UI Inventory Drift::UI inventory drift detected. Review artifacts/ui_inventory.current.json and artifacts/ui_inventory.diff.md."
            echo "UI inventory drift is warn-only in this workflow."
            exit 0
          fi
          echo "::error title=UI Inventory Check Failure::Command failed with exit code ${EXIT_CODE}."
          exit "${EXIT_CODE}"

      - name: Upload UI inventory artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-inventory-artifacts
          path: |
            artifacts/ui_inventory.current.json
            artifacts/ui_inventory.diff.md
          if-no-files-found: warn

