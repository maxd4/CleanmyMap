name: repo-governance

on:
  push:
  pull_request:

jobs:
  top-heavy-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enforce top heavy files policy
        run: npm run quality:top-heavy
