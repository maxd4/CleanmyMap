name: ci

on:
  push:
  pull_request:

jobs:
  web-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Lockfile policy
        run: npm run check:lockfile-policy

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: UTF-8 check for French-sensitive files
        run: npm run check:utf8-fr

      - name: Heavy files policy
        run: npm run quality:top-heavy

      - name: Web lint
        run: npm run lint

      - name: Web tests
        run: npm run test

  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Cleanup diagnostic check (non-destructive)
        run: python scripts/ci_cleanup.py --root . --check

      - name: Runtime SQLite tracking check
        run: python scripts/check_runtime_db_tracking.py --root .

      - name: UTF-8 normalization check
        run: python scripts/normalize_utf8.py --root . --check

      - name: Python syntax check
        run: |
          python -m py_compile app.py
          python -m py_compile src/database.py
          python -m py_compile src/map_utils.py
          python -m py_compile src/report_generator.py

      - name: Unit tests
        run: pytest -q
