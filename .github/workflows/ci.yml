name: ci

on:
  push:
  pull_request:

jobs:
  web-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Lockfile policy
        run: npm run check:lockfile-policy

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: UTF-8 check for French-sensitive files
        run: npm run check:utf8-fr

      - name: Heavy files policy
        run: npm run quality:top-heavy

      - name: Web lint
        run: npm run lint

      - name: Web tests
        run: npm run test

