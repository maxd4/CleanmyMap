name: ci

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
  pull_request:

jobs:
  fast-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      docs_only: ${{ steps.scope.outputs.docs_only }}
      companion_code_relevant: ${{ steps.scope.outputs.companion_code_relevant }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Detect scope
        id: scope
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi

          if [[ "$base" =~ ^0+$ ]]; then
            base="$(git rev-list --max-parents=0 HEAD | tail -n 1)"
          fi

          changed_files="$(git diff --name-only "$base" "$head")"
          docs_only=true
          companion_code_relevant=false

          while IFS= read -r file; do
            [[ -z "$file" ]] && continue

            case "$file" in
              documentation/*|*.md)
                ;;
              *)
                docs_only=false
                ;;
            esac

            case "$file" in
              companion-app/*.md)
                ;;
              companion-app/*|.github/workflows/ci.yml)
                companion_code_relevant=true
                ;;
            esac
          done <<< "$changed_files"

          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"
          echo "companion_code_relevant=$companion_code_relevant" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "20"

      # Security and repository governance must run even for documentation-only changes.
      - name: Secret audit
        run: npm run security:secrets

      - name: Root file hygiene
        run: npm run check:root-files

      - name: Documentation governance
        run: npm run check:doc-governance

      - name: Stack documentation drift
        run: npm run check:stack-doc-drift

      - name: Agent skill mirror check
        run: npm run check:agent-skills

      - name: Install Node dependencies
        if: steps.scope.outputs.docs_only != 'true'
        run: npm ci

      - name: Lockfile policy
        if: steps.scope.outputs.docs_only != 'true'
        run: npm run check:lockfile-policy

      - name: TypeScript typecheck
        if: steps.scope.outputs.docs_only != 'true'
        run: npm run typecheck

      - name: UTF-8 check for French-sensitive files
        if: steps.scope.outputs.docs_only != 'true'
        run: npm run check:utf8-fr

      - name: Heavy files policy
        if: steps.scope.outputs.docs_only != 'true'
        run: npm run quality:top-heavy

      - name: Web lint
        if: steps.scope.outputs.docs_only != 'true'
        run: npm run lint

      - name: Web tests
        if: steps.scope.outputs.docs_only != 'true'
        run: npm run test

      - name: Vercel regression gates
        if: steps.scope.outputs.docs_only != 'true'
        run: npm run test:regression-gates

      - name: Vercel audits
        if: ${{ always() && steps.scope.outputs.docs_only != 'true' }}
        run: npm run audit:vercel:ci

      - name: Web production build
        if: steps.scope.outputs.docs_only != 'true'
        run: npm run build

  security-checks:
    needs: fast-checks
    if: needs.fast-checks.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: Security invariants and targeted tests
        run: npm run test:security

  companion-checks:
    needs: fast-checks
    if: needs.fast-checks.outputs.companion_code_relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: companion-app/package-lock.json

      - name: Install companion dependencies
        run: npm ci --prefix companion-app

      - name: Companion typecheck
        run: npm --prefix companion-app run typecheck
