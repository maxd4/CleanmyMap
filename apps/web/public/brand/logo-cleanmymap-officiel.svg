<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" width="520" height="160" role="img" aria-label="CleanMyMap">
  <defs>
    <linearGradient id="cmm-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="50%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@900&amp;display=swap');
      .wordmark { font-family: Outfit, system-ui, sans-serif; font-weight: 900; }
    </style>
  </defs>

  <!-- Pictogramme gauche -->
  <rect x="24" y="24" width="80" height="80" rx="18" fill="url(#cmm-grad)"/>
  <!-- Map pin icon inside pictogram -->
  <path d="M64 42 C54 42 46 50 46 60 C46 72 64 86 64 86 C64 86 82 72 82 60 C82 50 74 42 64 42 Z" fill="white" opacity="0.95"/>
  <circle cx="64" cy="60" r="7" fill="url(#cmm-grad)"/>

  <!-- Wordmark CleanMyMap -->
  <text x="124" y="74" class="wordmark" font-family="Outfit, system-ui, sans-serif" font-weight="900" font-size="38" letter-spacing="4" fill="#1e3a5f" text-anchor="start">CleanMyMap</text>

  <!-- Sous-titre -->
  <text x="124" y="106" font-family="Outfit, system-ui, sans-serif" font-weight="900" font-size="13" letter-spacing="2.5" fill="#1d4ed8" text-anchor="start" text-transform="uppercase">
    <tspan>DÉPOLLUER — CARTOGRAPHIER — IMPACTER</tspan>
  </text>

  <!-- Ligne décorative sous le wordmark -->
  <line x1="124" y1="83" x2="490" y2="83" stroke="url(#cmm-grad)" stroke-width="1.5" opacity="0.3"/>
</svg>
